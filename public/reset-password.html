<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - LoopTailor</title>
    <style>
        :root {
            --primary-green: #1FAF5A;
            --primary-hover: #188c48;
            --bg-color: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --error-bg: #fef2f2;
            --error-text: #ef4444;
            --success-bg: #f0fdf4;
            --success-text: #0d3d33;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #f9fafb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 400px;
            padding: 40px 32px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
        }
        .logo span {
            color: var(--primary-green);
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            text-align: center;
        }
        p.subtitle {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 6px;
        }
        input[type="email"] {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="email"]:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(31, 175, 90, 0.1);
        }
        button {
            width: 100%;
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            height: 44px;
        }
        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            line-height: 1.4;
        }
        .message.error {
            background-color: var(--error-bg);
            color: var(--error-text);
            border: 1px solid #fecaca;
            display: block;
        }
        .message.success {
            background-color: var(--success-bg);
            color: var(--success-text);
            border: 1px solid #bbf7d0;
            display: block;
        }
        .spinner {
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 2px solid white;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Loop<span>Tailor</span></div>
        <h1>Reset your password</h1>
        <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>
        
        <div id="messageBox" class="message"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <button type="submit" id="submitBtn">
                <span id="btnText">Send reset link</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </form>
        <a href="/" class="back-link">Return to sign in</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDd2HsiD-yRps2q-FgbH8G5w_Wl1vJMMC8",
            authDomain: "tailor-app-76f20.firebaseapp.com",
            projectId: "tailor-app-76f20",
            storageBucket: "tailor-app-76f20.firebasestorage.app",
            messagingSenderId: "974622533594",
            appId: "1:974622533594:web:e9b27ddf8886abbb4942e3",
            measurementId: "G-5BMD8109NH"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const form = document.getElementById('resetForm');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const messageBox = document.getElementById('messageBox');

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = `message ${type}`;
        }

        function hideMessage() {
            messageBox.className = 'message';
        }

        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                btnText.style.display = 'none';
                spinner.style.display = 'block';
            } else {
                submitBtn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();
            
            const email = emailInput.value.trim();
            
            if (!email) {
                showMessage('Please enter your email address.', 'error');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address.', 'error');
                return;
            }

            setLoading(true);

            try {
                await sendPasswordResetEmail(auth, email);
                showMessage('Password reset email sent! Please check your inbox.', 'success');
                form.reset();
            } catch (error) {
                console.error('Error sending password reset email:', error);
                let errorMessage = 'An error occurred while sending the reset link. Please try again.';
                
                if (error.code === 'auth/invalid-email') {
                    errorMessage = 'The email address is invalid.';
                } else if (error.code === 'auth/user-not-found') {
                    // Security best practice: don't reveal if email exists
                    showMessage('If an account exists with this email, a reset link has been sent.', 'success');
                    form.reset();
                    setLoading(false);
                    return;
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Too many requests. Please try again later.';
                }
                
                showMessage(errorMessage, 'error');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
