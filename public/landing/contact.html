<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - LoopTailor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: 'var(--primary)',
                            accent: 'var(--accent)',
                            bg: 'var(--bg)',
                            card: 'var(--card)',
                            heading: 'var(--text-h)',
                            body: 'var(--text-b)',
                            border: 'var(--border)',
                            caption: 'var(--caption)'
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        inter: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg text-brand-heading antialiased fade-in">

    <div id="header-container"></div>

    <main class="min-h-screen pt-20 pb-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-12">
            <div class="bg-brand-card rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row border border-gray-100">
                
                <!-- Info Section -->
                <div class="bg-brand-accent text-white p-10 md:p-16 md:w-2/5 relative overflow-hidden">
                    <h2 class="text-3xl font-bold mb-4 z-10 relative">Get in touch</h2>
                    <p class="text-brand-body font-inter mb-12 z-10 relative">We'd love to hear from you. Please fill out this form or reach out via email.</p>
                    
                    <div class="space-y-8 z-10 relative">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-brand-card/10 rounded-full flex items-center justify-center">
                                <span class="material-symbols-outlined text-brand-primary">mail</span>
                            </div>
                            <div>
                                <p class="text-sm text-brand-body font-inter">Email us at</p>
                                <p class="font-bold">looptailor@gmail.com</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-brand-card/10 rounded-full flex items-center justify-center">
                                <span class="material-symbols-outlined text-brand-primary">location_on</span>
                            </div>
                            <div>
                                <p class="text-sm text-brand-body font-inter">HQ</p>
                                <p class="font-bold">Global / Remote</p>
                            </div>
                        </div>
                    </div>

                    <!-- Decorative circles -->
                    <div class="absolute -bottom-24 -right-12 w-64 h-64 bg-brand-primary/20 rounded-full blur-2xl"></div>
                    <div class="absolute top-12 left-12 w-32 h-32 border-4 border-white/5 rounded-full"></div>
                </div>

                <!-- Form Section -->
                <div class="p-10 md:p-16 md:w-3/5 bg-brand-card">
                    <form class="space-y-6" id="contact-form">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label for="firstName" class="block text-sm font-medium text-brand-body font-inter mb-2">First Name</label>
                                <input type="text" id="firstName" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brand-primary focus:border-brand-primary transition-colors bg-gray-50 font-inter outline-none" placeholder="John" required>
                            </div>
                            <div>
                                <label for="lastName" class="block text-sm font-medium text-brand-body font-inter mb-2">Last Name</label>
                                <input type="text" id="lastName" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brand-primary focus:border-brand-primary transition-colors bg-gray-50 font-inter outline-none" placeholder="Doe" required>
                            </div>
                        </div>
                        <div>
                            <label for="email" class="block text-sm font-medium text-brand-body font-inter mb-2">Email Address</label>
                            <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brand-primary focus:border-brand-primary transition-colors bg-gray-50 font-inter outline-none" placeholder="john@example.com" required>
                        </div>
                        <div>
                            <label for="message" class="block text-sm font-medium text-brand-body font-inter mb-2">Message</label>
                            <textarea id="message" rows="4" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brand-primary focus:border-brand-primary transition-colors bg-gray-50 font-inter outline-none resize-none" placeholder="How can we help you?" required></textarea>
                        </div>
                        <button type="submit" class="w-full bg-brand-primary text-white font-bold py-4 rounded-xl hover:opacity-90 transition-colors shadow-md hover:shadow-lg mt-4">
                            Send Message
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="script.js"></script>
    <script>
        document.getElementById('contact-form')?.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Thanks for contacting us! We will get back to you soon.');
            e.target.reset();
        });
    </script>
</body>
</html>
