    <script>
      (function() {
        // Detailed error logging
        function logError(type, detail) {
          const reason = detail instanceof Error ? (detail.stack || detail.message) : (typeof detail === 'object' ? JSON.stringify(detail, null, 2) : String(detail));
          
          // Ignore errors from browser extensions and known harmless fetch setter errors
          if (reason.includes('chrome-extension://') || 
              reason.includes('moz-extension://') || 
              reason.includes('Cannot set property fetch of #<Window>')) {
            console.warn('Ignored harmless or external error:', reason);
            return;
          }

          console.error(type + ':', reason);
          // Also set a global flag for debugging
          window.__LAST_CRITICAL_ERROR = { type, reason, timestamp: new Date().toISOString() };

          if (document.body) {
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = 'position:fixed; bottom:0; left:0; right:0; background:rgba(0,0,0,0.8); color:white; padding:10px; font-family:monospace; font-size:10px; z-index:9999; max-height:200px; overflow:auto; pointer-events:none;';
            errorDiv.innerText = `${type}: ${reason}`;
            document.body.appendChild(errorDiv);
          }
        }

        window.addEventListener('error', function(event) {
          logError('CRITICAL EARLY ERROR', event.error || event.message);
        });

    window.addEventListener('unhandledrejection', function(event) {
      // Better extraction for unhandled rejections
      const reason = event.reason;
      let message = '';
      
      if (!reason) {
        message = 'Undefined or null rejection reason';
      } else if (reason instanceof Error) {
        message = reason.stack || reason.message;
      } else if (typeof reason === 'object') {
        try {
          message = JSON.stringify(reason, Object.getOwnPropertyNames(reason), 2);
        } catch(e) {
          message = 'Object rejection: ' + String(reason);
        }
      } else {
        message = String(reason);
      }
      
      logError('CRITICAL EARLY REJECTION', message);
    });
      })();
    </script>
